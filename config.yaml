gateway_callsign: MSHT-GW
gateway_uid: GW-01
# Einzelner Port:
meshtastic_port: COM7
# Mehrere Ports (Liste für Multi-Stream-Betrieb):
# meshtastic_port:
#   - COM7
#   - COM3
# Hier die IP deines Ubuntu-Servers eintragen "123.12.12.12"
tak_server_host: 123.12.12.12
# WICHTIG: Port 8088 nutzen (das ist der Eingang unserer Bridge)
tak_server_port: 8088

tak_server_protocol: TCP                               

# true  = alle Nodes anzeigen – Nodes ohne GPS-Fix werden bei park_lat/park_lon platziert (empfohlen)
# false = nur Nodes mit gültigen GPS-Koordinaten senden
send_nodes_without_gps: true

# Fallback-Koordinaten für Nodes ohne GPS-Fix.
# WICHTIG: Diese müssen gesetzt sein wenn send_nodes_without_gps=true,
# sonst erscheinen no-fix Nodes bei (0,0) / Null Island im Atlantik!
# Beispiel: Koordinaten eurer Basis/Funkstelle eintragen:
# park_lat: 48.1351
# park_lon: 11.5820

# Log-Level: INFO (Standard) zeigt nur wichtige Meldungen.
# DEBUG aktiviert Rohdaten-Ausgabe aller empfangenen Meshtastic-Pakete.
# Mögliche Werte: DEBUG, INFO, WARNING, ERROR
# log_level: DEBUG
