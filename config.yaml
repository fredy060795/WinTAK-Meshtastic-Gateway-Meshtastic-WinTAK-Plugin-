gateway_callsign: MSHT-GW
gateway_uid: GW-01
# Einzelner Port:
meshtastic_port: COM7
# Mehrere Ports (Liste für Multi-Stream-Betrieb):
# meshtastic_port:
#   - COM7
#   - COM3
# Optionaler Relay-Betrieb: empfangenen Mesh-Text automatisch an alle anderen ausgewählten COM-Ports senden
relay_text_messages: true
# Optional nur von diesen COM-Ports relayen (einzelner Wert oder Liste)
# relay_text_from_ports: COM7
# Optional nur an diese COM-Ports relayen (einzelner Wert oder Liste)
# relay_text_to_ports:
#   - COM3
#   - COM9
# Hier die IP deines Ubuntu-Servers eintragen "123.12.12.12"
tak_server_host: 123.12.12.12
# WICHTIG: Port 8088 nutzen (das ist der Eingang unserer Bridge)
tak_server_port: 8088

tak_server_protocol: TCP                               # TCP/UDP; falls pytak installiert ist, nutzt der Remote-Uplink PyTAK

# Lokales WinTAK-Ziel für Positions- und Chat-CoT
local_tak_ip: 127.0.0.1
local_tak_port: 4242

# UDP-Port, auf den WinTAK seine GeoChat-/Chat-CoT- und sonstigen CoT-Nachrichten
# an dieses Gateway senden soll, damit sie ins Meshtastic-Mesh ausgestrahlt werden.
# Wie bei der LPU5-TAK-Bridge standardmäßig auf dem normalen TAK-UDP-Port 4242.
local_tak_chat_listen_port: 4242
# LPU5-kompatibler WinTAK/ATAK TCP-Empfangspfad:
# Das Gateway verbindet sich als TCP-Client zum in WinTAK/ATAK konfigurierten lokalen Server
# (typisch 127.0.0.1:8087, kein Zertifikat nötig).
# Die aktive Verbindung ist bidirektional: WinTAK -> Gateway und Mesh-CoT -> WinTAK.
local_tak_tcp_receiver_enabled: true
local_tak_tcp_receiver_host: 127.0.0.1
local_tak_tcp_receiver_port: 8087
# Pong-/Keepalive-Fenster für die lokale WinTAK-TCP-Verbindung in Sekunden.
# Höher setzen, wenn WinTAK die 127.0.0.1-Verbindung wegen zu kurzer Keepalive-Gültigkeit trennt.
local_tak_tcp_pong_stale_seconds: 120
# Optionaler lokaler TCP-Fallback-Listener für externe/ältere Setups.
local_tak_tcp_listen_port: 8088
# Optional: zusätzliche TAK-Multicast-Gruppen für GeoChat / SA lauschen und senden
# (hilfreich wenn WinTAK/ATAK oder ein TAK-Server Chat/CoT per Multicast verteilt).
tak_multicast_groups:
  - 224.10.10.1:17012
  - 239.2.3.1:6969
# Optional: lokale Interface-IP für den Multicast-Join (Standard 0.0.0.0 = OS-Default).
# tak_multicast_interface_ip: 0.0.0.0
# Optional: auf welcher lokalen IP der Chat-Listener lauscht.
# Standard ist 0.0.0.0, damit WinTAK sowohl über 127.0.0.1 als auch über die LAN-IP
# des Gateway-Rechners senden kann. Ausgehende Mesh-Nachrichten gehen immer auf Main-Channel 0.
# local_tak_chat_listen_ip: 0.0.0.0
# Optional: eigene Bind-IP für den TCP-Listener. Standard ist 0.0.0.0,
# damit WinTAK wie bei LPU5 auch von anderen Systemen per TCP 8088 verbinden kann.
# local_tak_tcp_listen_ip: 0.0.0.0

# true  = alle Nodes anzeigen – Nodes ohne GPS-Fix werden bei park_lat/park_lon platziert (empfohlen)
# false = nur Nodes mit gültigen GPS-Koordinaten senden
send_nodes_without_gps: true

# Fallback-Koordinaten für Nodes ohne GPS-Fix.
# WICHTIG: Diese müssen gesetzt sein wenn send_nodes_without_gps=true,
# sonst werden no-fix Nodes übersprungen.
# Beispiel: Koordinaten eurer Basis/Funkstelle eintragen:
# park_lat: 48.1351
# park_lon: 11.5820

# Optional: Beim Start die eigene Gateway-Position ins Mesh schreiben
# (nutzt park_lat/park_lon als feste Position für den lokalen Knoten)
# set_gateway_position_on_start: true

# Log-Level: INFO (Standard) zeigt nur wichtige Meldungen.
# DEBUG aktiviert zusätzliche Diagnosen für empfangene Meshtastic- sowie WinTAK/TAK-Pakete.
# Mögliche Werte: DEBUG, INFO, WARNING, ERROR
# log_level: DEBUG
